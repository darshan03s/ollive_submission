services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ollive
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ollive"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6378:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: pnpm --filter db migrate
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ollive
    depends_on:
      postgres:
        condition: service_healthy

  ingest:
    build:
      context: .
      dockerfile: Dockerfile
      target: ingest
    command: pnpm --filter ingest start
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      INGEST_SERVICE_CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ollive
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    command: pnpm --filter web start
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY}
      INGEST_SERVICE_URL: http://ingest:3001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ollive
    depends_on:
      ingest:
        condition: service_started
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
